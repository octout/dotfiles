set-option -g mouse on
# true colorを表示できるようにする
set-option -g default-terminal "tmux-256color"
# セッション作成時に左側にtmux-treeを自動起動
set-hook -g session-created "split-window -hb $HOME/dotfiles/bin/tmux-tree"
# ダブルクリックで単語(URL)を既定アプリで開く。mouse on 下で Cmd+ダブルクリックが
# tmux に奪われ Terminal.app の URL ハンドラに届かない問題への対処。
bind-key -T root DoubleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-word \; \
    send-keys -X copy-pipe-and-cancel "xargs open"
# ドラッグ選択終了時に macOS クリップボードへ転送 (emacs/vi 両モード)
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
